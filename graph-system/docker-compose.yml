version: "3.9"
services:
  neo4j:
    image: neo4j:5.14
    ports:
      - "7687:7687"
      - "7474:7474"
    environment:
      NEO4J_AUTH: "neo4j/neo4j-pass-graph-system"
    volumes:
      - neo4j_data:/data

  backend:
    build:
      context: ./graph-system/backend
    command: npm start
    ports:
      - "4000:4000"
    depends_on:
      - neo4j
    volumes:
      - ./sap-o2c-data:/app/sap-o2c-data:ro
      - ./graph-system/backend:/app
    environment:
      PORT: 4000
      NEO4J_URI: "neo4j://neo4j:7687"
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4j-pass-graph-system
      LLM_PROVIDER: openrouter
      LLM_API_KEY: "<YOUR_KEY>"
      LLM_MODEL: meta-llama/llama-3.1-70b-instruct
      DATA_ROOT: /app/sap-o2c-data

  frontend:
    build:
      context: ./graph-system/frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_BACKEND_URL: "http://backend:4000"

volumes:
  neo4j_data: