version: "3.8"

services:
  neo4j:
    image: neo4j:5
    container_name: graph_system_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/neo4j-pass-graph-system
      - NEO4J_dbms_default__listen__address=0.0.0.0
    volumes:
      - neo4j_data:/data

volumes:
  neo4j_data:

